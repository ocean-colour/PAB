name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          # The offline suite needs only this lean set; the heavy/optional deps
          # (argopy, earthaccess, bokeh, healpy, and the special-source
          # bing/ocpy/remote_sensing) are not required — tests that touch them
          # use pytest.importorskip and are skipped here. Install the package
          # itself without pulling all of requirements.txt.
          python -m pip install numpy scipy pandas pyarrow xarray gsw matplotlib pytest
          python -m pip install -e . --no-deps
      - name: Run tests
        run: pytest

  docs:
    name: docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docs deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install sphinx sphinx-rtd-theme myst-parser sphinxcontrib-mermaid
      - name: Build HTML docs
        run: sphinx-build -b html -W --keep-going docs docs/_build/html
